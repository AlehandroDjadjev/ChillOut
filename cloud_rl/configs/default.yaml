data_root: dataset_out
out_dir: ./runs/cloud_rl
image_height: 256
image_width: 256
batch_size: 16
num_workers: 0
seed: 42

policy:
  max_actions: 3
  hidden_dim: 256
  lr: 0.0003
  entropy_coef: 0.01
  value_coef: 0.5
  clip_eps: 0.2
  ppo_epochs: 2
  grad_clip: 0.5

training:
  updates: 1000
  steps_per_update: 8
  save_every: 50
  eval_every: 50

normalization:
  # Used when no stats.json exists. Better: run once with --write-stats.
  target_temp_mean: 20.0
  target_temp_std: 10.0
